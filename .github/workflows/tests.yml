name: tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build wheel pytest

      - name: Build wheel
        run: python -m build --wheel

      - name: Install wheel (Linux/macOS)
        if: runner.os != 'Windows'
        run: python -m pip install dist/*.whl

      - name: Install wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $whl = Get-ChildItem dist -Filter *.whl | Select-Object -First 1
          python -m pip install $whl.FullName

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Run smoke tests (end-to-end, ~1 min)
        run: pytest tests/ -m slow -v
